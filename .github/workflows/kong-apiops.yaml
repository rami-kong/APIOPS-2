
name: Kong Konnect APIOps Demo

on:
	push:
		branches: [ main ]
	pull_request:
		branches: [ main ]

jobs:
	lint:
		runs-on: ubuntu-latest
		steps:
			- uses: actions/checkout@v4
			- name: Lint OpenAPI spec
				uses: stoplightio/spectral-action@v0.8.10
				with:
					file_glob: "specs/oas.yaml"

	build:
		runs-on: ubuntu-latest
		needs: lint
		steps:
			- uses: actions/checkout@v4
			- name: Generate Kong resources from OpenAPI
				run: |
					bash scripts/generate_gateway_resources.sh
			- name: Terraform Init
				run: |
					cd terraform
					terraform init -input=false
			- name: Terraform Plan
				run: |
					cd terraform
					terraform plan -input=false

	deploy:
		runs-on: ubuntu-latest
		needs: build
		steps:
			- uses: actions/checkout@v4
			- name: Terraform Apply
				run: |
					cd terraform
					terraform apply -auto-approve -input=false
			- name: decK Sync
				run: |
					deck sync -s config/merged.yaml

	smoke-test:
		runs-on: ubuntu-latest
		needs: deploy
		steps:
			- uses: actions/checkout@v4
			- name: Smoke Test API
				run: |
					curl -i https://{YOUR_KONNECT_API_ENDPOINT}/anything
