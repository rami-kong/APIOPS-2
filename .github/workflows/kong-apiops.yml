name: Kong APIOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'specs/**'
      - 'config/**'
      - 'terraform/**'
      - 'scripts/**'
      - '.github/workflows/kong-apiops.yml'

  pull_request:
    branches: [main]
    paths:
      - 'specs/**'
      - 'config/**'
      - 'terraform/**'
      - 'scripts/**'

  workflow_dispatch:
    inputs:
      destroy:
        description: 'Destroy all resources'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  TERRAFORM_DIR: terraform
  SCRIPTS_DIR: scripts
  KONNECT_SERVER_URL: ${{ vars.KONNECT_SERVER_URL || 'https://au.api.konghq.com' }}
  KONNECT_REGION: ${{ vars.KONNECT_REGION || 'au' }}

jobs:
  # ============================================================
  # SCENARIO 1: Gateway Deploy (deck + Terraform)
  # Creates gateway services, routes, and plugins
  # ============================================================
  gateway-deploy:
    name: "Scenario 1: Gateway Deploy (deck + Terraform)"
    runs-on: ubuntu-latest
    if: github.event.inputs.destroy != 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Validate ---
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Validate OpenAPI specs
        run: |
          for spec in specs/*.yaml; do
            echo "Validating $spec..."
            yq eval '.' "$spec" > /dev/null || { echo "Invalid YAML: $spec"; exit 1; }
            KONG_NAME=$(yq eval '.x-kong-name // "not-found"' "$spec")
            echo "  x-kong-name: $KONG_NAME"
          done
          echo "All specs validated"

      - name: Validate APIs configuration
        run: |
          yq eval '.' config/apis.yaml > /dev/null || { echo "Invalid apis.yaml"; exit 1; }
          echo "APIs configuration valid"

      # --- Generate ---
      - name: Install deck CLI
        run: |
          DECK_VERSION=$(curl -sI https://github.com/Kong/deck/releases/latest | grep -i location | sed 's/.*tag\/v//' | tr -d '\r\n')
          curl -sL "https://github.com/Kong/deck/releases/download/v${DECK_VERSION}/deck_${DECK_VERSION}_linux_amd64.tar.gz" | tar xz -C /tmp
          sudo mv /tmp/deck /usr/local/bin/deck
          deck version

      - name: Generate Kong resources
        working-directory: ${{ env.SCRIPTS_DIR }}
        run: bash generate_gateway_resources.sh

      # --- Terraform ---
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init

      - name: Terraform Plan
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform plan -no-color
        env:
          TF_VAR_konnect_token: ${{ secrets.KONNECT_TOKEN }}
          TF_VAR_konnect_server_url: ${{ env.KONNECT_SERVER_URL }}
          TF_VAR_control_plane_name: ${{ vars.CONTROL_PLANE_NAME }}
          TF_VAR_portal_name: ${{ vars.PORTAL_NAME }}

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform apply -auto-approve -no-color
        env:
          TF_VAR_konnect_token: ${{ secrets.KONNECT_TOKEN }}
          TF_VAR_konnect_server_url: ${{ env.KONNECT_SERVER_URL }}
          TF_VAR_control_plane_name: ${{ vars.CONTROL_PLANE_NAME }}
          TF_VAR_portal_name: ${{ vars.PORTAL_NAME }}

      - name: Commit Terraform State
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.TERRAFORM_DIR }}/terraform.tfstate
          git diff --cached --quiet || git commit -m "Update Terraform state [skip ci]"
          git push

      - name: Gateway Deploy Summary
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          echo "## Scenario 1: Gateway Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Control Plane | ${{ vars.CONTROL_PLANE_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | ${{ env.KONNECT_SERVER_URL }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # SCENARIO 2: Portal & API Publish (kongctl)
  # Creates a developer portal and publishes APIs to it
  # ============================================================
  portal-publish:
    name: "Scenario 2: Portal & API Publish (kongctl)"
    needs: gateway-deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && github.event.inputs.destroy != 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install kongctl
        run: |
          KONGCTL_VERSION=$(curl -sI https://github.com/Kong/kongctl/releases/latest | grep -i location | sed 's/.*tag\/v//' | tr -d '\r\n')
          curl -sL "https://github.com/Kong/kongctl/releases/download/v${KONGCTL_VERSION}/kongctl_linux_amd64.zip" -o /tmp/kongctl.zip
          unzip -o /tmp/kongctl.zip -d /tmp
          sudo mv /tmp/kongctl /usr/local/bin/kongctl
          chmod +x /usr/local/bin/kongctl
          kongctl version --full

      - name: Preview portal changes (diff)
        run: |
          kongctl diff -f config/portal.yaml --pat "${{ secrets.KONNECT_TOKEN }}" --region ${{ env.KONNECT_REGION }}
        continue-on-error: true

      - name: Create portal & publish APIs
        run: |
          kongctl apply -f config/portal.yaml --pat "${{ secrets.KONNECT_TOKEN }}" --region ${{ env.KONNECT_REGION }}

      - name: Verify portal
        run: |
          echo "=== Portals ==="
          kongctl get portals --pat "${{ secrets.KONNECT_TOKEN }}" --region ${{ env.KONNECT_REGION }}
          echo ""
          echo "=== APIs ==="
          kongctl get apis --pat "${{ secrets.KONNECT_TOKEN }}" --region ${{ env.KONNECT_REGION }}

      - name: Portal Publish Summary
        run: |
          echo "## Scenario 2: Portal & API Publish Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Portal | rami-apiops-portal |" >> $GITHUB_STEP_SUMMARY
          echo "| API | Echo Testing API |" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | kongctl |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | ${{ env.KONNECT_REGION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # DESTROY: Tear down all resources
  # ============================================================
  destroy:
    name: Destroy All Resources
    runs-on: ubuntu-latest
    if: github.event.inputs.destroy == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- kongctl destroy portal first ---
      - name: Install kongctl
        run: |
          KONGCTL_VERSION=$(curl -sI https://github.com/Kong/kongctl/releases/latest | grep -i location | sed 's/.*tag\/v//' | tr -d '\r\n')
          curl -sL "https://github.com/Kong/kongctl/releases/download/v${KONGCTL_VERSION}/kongctl_linux_amd64.zip" -o /tmp/kongctl.zip
          unzip -o /tmp/kongctl.zip -d /tmp
          sudo mv /tmp/kongctl /usr/local/bin/kongctl
          chmod +x /usr/local/bin/kongctl

      - name: Destroy portal resources (kongctl)
        run: |
          kongctl sync -f /dev/null --pat "${{ secrets.KONNECT_TOKEN }}" --region ${{ env.KONNECT_REGION }} || true
        continue-on-error: true

      # --- Terraform destroy gateway ---
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform init

      - name: Terraform Destroy
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform destroy -auto-approve -no-color
        env:
          TF_VAR_konnect_token: ${{ secrets.KONNECT_TOKEN }}
          TF_VAR_konnect_server_url: ${{ env.KONNECT_SERVER_URL }}
          TF_VAR_control_plane_name: ${{ vars.CONTROL_PLANE_NAME }}
          TF_VAR_portal_name: ${{ vars.PORTAL_NAME }}

      - name: Commit Terraform State
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.TERRAFORM_DIR }}/terraform.tfstate
          git diff --cached --quiet || git commit -m "Update Terraform state after destroy [skip ci]"
          git push

      - name: Destroy Summary
        run: |
          echo "## All Resources Destroyed" >> $GITHUB_STEP_SUMMARY
          echo "- Gateway resources (Terraform)" >> $GITHUB_STEP_SUMMARY
          echo "- Portal & API publications (kongctl)" >> $GITHUB_STEP_SUMMARY
