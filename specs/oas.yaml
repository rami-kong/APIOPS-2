openapi: "3.0.1"
info:
  title: "ApiOps Echo Service"
  version: "1.0.0"
  description: "Echo API for testing HTTP methods and request data. Proxied through Kong Gateway to httpbin.org."
  contact:
    name: "Rami APIOps Team"
servers:
  - url: "https://httpbin.org"
    description: "Upstream service (httpbin.org)"

# Kong-specific extensions - Also change apis.yaml Lines 42 and 49 must match this name
x-kong-name: "rami-apiops-demo"
x-kong-service-defaults:
  retries: 6
  connect_timeout: 60000
  write_timeout: 60000
  read_timeout: 60000

# Global Kong plugins
# x-kong-plugin-key-auth:
#   enabled: true
#   config:
#     key_names: ["apiKey"]
#     key_in_header: true
#     key_in_query: false
#     hide_credentials: true

x-kong-plugin-rate-limiting:
  enabled: true
  config:
    minute: 90
    hour: 1000
    policy: "local"
    hide_client_headers: false

x-kong-tags: [ "owner=rami", "created_by:terraform", "environment:dev" ]

paths:
  /anything:
    get:
      operationId: Httpbin-Anything
      summary: "Returns anything passed in request data."
      description: "Returns anything that is passed to request. Useful for testing HTTP methods and request data."
      tags:
        - "Testing"
      parameters:
        - name: "test"
          in: "query"
          description: "Test parameter"
          required: false
          schema:
            type: "string"
      responses:
        '200':
          description: "Request data"
          content:
            application/json:
              schema:
                type: object
                properties:
                  method:
                    type: string
                    description: "HTTP method used"
                    example: "GET"
                  url:
                    type: string
                    description: "Request URL"
                    example: "https://httpbin.org/anything"
                  args:
                    type: object
                    description: "Query string arguments"
                    example: {}
                  headers:
                    type: object
                    description: "Request headers"
                    example:
                      Accept: "*/*"
                      Host: "httpbin.org"
                  data:
                    type: string
                    description: "Request body data"
                    example: ""
                  json:
                    type: object
                    description: "JSON request body"
                    example: null
                  origin:
                    type: string
                    description: "Client IP address"
                    example: "127.0.0.1"
              example:
                method: "GET"
                url: "https://httpbin.org/anything"
                args: {}
                headers:
                  Accept: "*/*"
                  Host: "httpbin.org"
                data: ""
                json: null
                origin: "127.0.0.1"
        '429':
          description: "Too Many Requests"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "API rate limit exceeded"
        '401':
          description: "Unauthorized"
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Invalid API key"

  /post:
    post:
      operationId: Httpbin-Post
      summary: "Httpbin POST data"
      description: "Returns the posted data back"
      tags:
        - "Testing"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: "Echoed data"
          content:
            application/json:
              schema:
                type: object
                properties:
                  echoed_data:
                    type: object
                  timestamp:
                    type: string
                    format: date-time
