# Kong Developer Portal & API Publication
# Managed by kongctl declarative configuration

portals:
  - ref: rami-portal
    name: "rami-apiops-portal"
    display_name: "Rami APIOps Developer Portal"
    description: "Developer Portal for Rami APIOps Demo - APIs managed through APIOps workflow"
    authentication_enabled: false
    rbac_enabled: false
    auto_approve_developers: false
    auto_approve_applications: false
    default_api_visibility: "public"
    default_page_visibility: "public"

    customization:
      ref: rami-portal-customization
      theme:
        mode: "light"
        colors:
          primary: "#0044f4"
      layout: "topnav"
      menu:
        main:
          - path: "/getting-started"
            title: "Getting Started"
            external: false
            visibility: "public"
          - path: "/apis"
            title: "APIs"
            external: false
            visibility: "public"
        footer_sections:
          - title: "Resources"
            items:
              - path: "/apis"
                title: "API Catalog"
                external: false
                visibility: "public"
              - path: "/getting-started"
                title: "Getting Started"
                external: false
                visibility: "public"
          - title: "APIOps"
            items:
              - path: "https://github.com/rami-kong/APIOPS-2"
                title: "GitHub Repository"
                external: true
                visibility: "public"
              - path: "https://docs.konghq.com"
                title: "Kong Documentation"
                external: true
                visibility: "public"

    pages:
      - ref: home-page
        slug: "home"
        title: "Home"
        description: "Portal home page"
        visibility: "public"
        status: "published"
        content: !file portal/pages/home.md

      - ref: apis-page
        slug: "apis"
        title: "APIs"
        description: "API Catalog"
        visibility: "public"
        status: "published"
        content: !file portal/pages/apis.md

      - ref: getting-started-page
        slug: "getting-started"
        title: "Getting Started"
        description: "Getting started guide"
        visibility: "public"
        status: "published"
        content: !file portal/pages/getting-started.md

apis:
  - ref: echo-api
    name: "Echo Testing API"
    description: "Echo API for testing HTTP methods and request data - Generated via Kong APIOps"
    versions:
      - ref: echo-api-v1
        name: "v1.0.0"
        spec: !file specs/oas.yaml
    documents:
      - ref: echo-api-docs
        title: "Echo API Documentation"
        slug: "echo-api-docs"
        status: "published"
        content: |
          # Echo API Documentation

          ## Overview

          The Echo API proxies requests to [httpbin.org](https://httpbin.org) through Kong Gateway. It is designed for testing HTTP methods, debugging request/response payloads, and validating gateway plugins like rate limiting.

          All examples below have been **tested live** and return real responses.

          ---

          ## Base URL

          ```
          https://httpbin.org
          ```

          ---

          ## Endpoints

          ### `GET` /anything

          Returns comprehensive information about the incoming request — method, headers, query parameters, origin IP, and full URL.

          **Request:**
          ```bash
          curl -s "https://httpbin.org/anything?source=apiops-portal&demo=true" | jq .
          ```

          **Response:**
          ```json
          {
            "args": {
              "demo": "true",
              "source": "apiops-portal"
            },
            "data": "",
            "files": {},
            "form": {},
            "headers": {
              "Accept": "*/*",
              "Host": "httpbin.org",
              "User-Agent": "curl/8.7.1"
            },
            "json": null,
            "method": "GET",
            "origin": "203.123.65.132",
            "url": "https://httpbin.org/anything?source=apiops-portal&demo=true"
          }
          ```

          | Field | Description |
          |-------|-------------|
          | `args` | Query string parameters |
          | `headers` | Request headers received by the upstream |
          | `method` | HTTP method used |
          | `origin` | Client IP address |
          | `url` | Full request URL |

          ---

          ### `POST` /post

          Accepts a JSON payload and echoes it back in the response. Useful for testing POST requests, validating payloads, and debugging content types.

          **Request:**
          ```bash
          curl -s -X POST "https://httpbin.org/post" \
            -H "Content-Type: application/json" \
            -d '{"message": "Hello from Rami APIOps", "demo": true, "timestamp": "2026-03-31T20:00:00Z"}' | jq .
          ```

          **Response:**
          ```json
          {
            "args": {},
            "data": "{\"message\": \"Hello from Rami APIOps\", \"demo\": true, \"timestamp\": \"2026-03-31T20:00:00Z\"}",
            "files": {},
            "form": {},
            "headers": {
              "Accept": "*/*",
              "Content-Length": "88",
              "Content-Type": "application/json",
              "Host": "httpbin.org"
            },
            "json": {
              "demo": true,
              "message": "Hello from Rami APIOps",
              "timestamp": "2026-03-31T20:00:00Z"
            },
            "origin": "203.123.65.132",
            "url": "https://httpbin.org/post"
          }
          ```

          | Field | Description |
          |-------|-------------|
          | `data` | Raw request body as a string |
          | `json` | Parsed JSON payload |
          | `headers` | Request headers including `Content-Type` |

          ---

          ## Error Responses

          | Status | Description |
          |--------|-------------|
          | `200` | Success — request data returned |
          | `401` | Unauthorized — invalid or missing API key (when key-auth plugin is enabled) |
          | `429` | Too Many Requests — rate limit exceeded |

          ---

          ## Rate Limiting

          When accessed through the Kong Gateway proxy, the following rate limits apply:

          | Limit | Value |
          |-------|-------|
          | Per minute | 90 requests |
          | Per hour | 1,000 requests |
          | Policy | local |
          | Client headers | Visible (`X-RateLimit-Remaining-Minute`, `X-RateLimit-Remaining-Hour`) |

          ---

          ## Kong Gateway Configuration

          This API is fully managed via the APIOps pipeline:

          | Resource | Details |
          |----------|---------|
          | **Service** | `rami-apiops-demo` → `httpbin.org:443` (HTTPS) |
          | **Route (GET)** | `~/anything$` — matches `GET /anything` |
          | **Route (POST)** | `~/post$` — matches `POST /post` |
          | **Plugin** | Rate Limiting (90/min, 1000/hr, local policy) |
          | **Tags** | `owner=rami`, `created_by:terraform`, `environment:dev` |

          ---

          ## APIOps Pipeline

          This API was deployed using:

          1. **OpenAPI Spec** → `specs/oas.yaml` with Kong extensions (`x-kong-name`, `x-kong-plugin-rate-limiting`)
          2. **deck** → Converts OAS to Kong declarative config, then to Terraform
          3. **Terraform** → Deploys gateway service, routes, and plugins to Kong Konnect
          4. **kongctl** → Publishes API with spec and docs to this Developer Portal
          5. **GitHub Actions** → Automates the entire pipeline on push
    publications:
      - ref: echo-api-pub
        portal_id: !ref rami-portal#id
        visibility: public
