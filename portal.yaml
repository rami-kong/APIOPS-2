# Kong Developer Portal & API Publication
# Managed by kongctl declarative configuration

portals:
  - ref: rami-portal
    name: "rami-apiops-portal"
    display_name: "Rami APIOps Developer Portal"
    description: "Developer Portal for Rami APIOps Demo - APIs managed through APIOps workflow"
    authentication_enabled: false
    rbac_enabled: false
    auto_approve_developers: false
    auto_approve_applications: false
    default_api_visibility: "public"
    default_page_visibility: "public"

    customization:
      ref: rami-portal-customization
      theme:
        mode: "light"
        colors:
          primary: "#0044f4"
      layout: "topnav"
      menu:
        main:
          - path: "/getting-started"
            title: "Getting Started"
            external: false
            visibility: "public"
          - path: "/apis"
            title: "APIs"
            external: false
            visibility: "public"
        footer_sections:
          - title: "Resources"
            items:
              - path: "/apis"
                title: "API Catalog"
                external: false
                visibility: "public"
              - path: "/getting-started"
                title: "Getting Started"
                external: false
                visibility: "public"
          - title: "APIOps"
            items:
              - path: "https://github.com/rami-kong/APIOPS-2"
                title: "GitHub Repository"
                external: true
                visibility: "public"
              - path: "https://docs.konghq.com"
                title: "Kong Documentation"
                external: true
                visibility: "public"

    pages:
      - ref: home-page
        slug: "home"
        title: "Home"
        description: "Portal home page"
        visibility: "public"
        status: "published"
        content: !file portal/pages/home.md

      - ref: apis-page
        slug: "apis"
        title: "APIs"
        description: "API Catalog"
        visibility: "public"
        status: "published"
        content: !file portal/pages/apis.md

      - ref: getting-started-page
        slug: "getting-started"
        title: "Getting Started"
        description: "Getting started guide"
        visibility: "public"
        status: "published"
        content: !file portal/pages/getting-started.md

apis:
  - ref: echo-api
    name: "Echo Testing API"
    description: "Echo API for testing HTTP methods and request data - Generated via Kong APIOps"
    versions:
      - ref: echo-api-v1
        name: "v1.0.0"
        spec: !file specs/oas.yaml
    documents:
      - ref: echo-api-docs
        title: "Echo API Documentation"
        slug: "echo-api-docs"
        status: "published"
        content: |
          # Echo API Documentation

          ## Overview
          The Echo API is designed for testing HTTP methods and debugging requests. It proxies to [httpbin.org](https://httpbin.org) through Kong Gateway with rate limiting applied.

          ## Base URL
          ```
          https://httpbin.org
          ```

          ## Endpoints

          ### GET /anything
          Returns comprehensive information about the request including headers, query parameters, and metadata.

          **Example Request:**
          ```bash
          curl -s "https://httpbin.org/anything?test=demo" | jq .
          ```

          **Example Response:**
          ```json
          {
            "args": { "test": "demo" },
            "headers": { "Host": "httpbin.org", "Accept": "*/*" },
            "method": "GET",
            "origin": "203.0.113.1",
            "url": "https://httpbin.org/anything?test=demo"
          }
          ```

          ### POST /post
          Returns the posted data back. Useful for testing POST payloads.

          **Example Request:**
          ```bash
          curl -s -X POST "https://httpbin.org/post" \
            -H "Content-Type: application/json" \
            -d '{"message": "Hello from APIOps", "demo": true}' | jq .
          ```

          **Example Response:**
          ```json
          {
            "json": { "message": "Hello from APIOps", "demo": true },
            "headers": { "Content-Type": "application/json" },
            "method": "POST",
            "origin": "203.0.113.1",
            "url": "https://httpbin.org/post"
          }
          ```

          ## Rate Limiting
          When accessed through the Kong Gateway proxy:
          - **90 requests per minute**
          - **1000 requests per hour**
          - Policy: local

          ## Kong Gateway Configuration
          This API is managed via APIOps:
          - **Service**: `rami-apiops-demo` → `httpbin.org:443`
          - **Routes**: `~/anything$` (GET), `~/post$` (POST)
          - **Plugin**: Rate Limiting (90/min, 1000/hr)
    publications:
      - ref: echo-api-pub
        portal_id: !ref rami-portal#id
        visibility: public
